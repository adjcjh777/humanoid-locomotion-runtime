<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">Humanoid Locomotion Runtime project structure</title>
  <desc id="desc">A concise V0, V1, V2 architecture map for the Humanoid Locomotion Runtime project.</desc>
  <defs>
    <marker id="arrow-main" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2f5f6f" />
    </marker>
    <marker id="arrow-soft" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#8a6f1a" />
    </marker>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#263238" flood-opacity="0.14" />
    </filter>
    <style>
      .bg { fill: #f7f9fb; }
      .title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14212b; }
      .subtitle { font: 500 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #53636f; }
      .section-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17242f; }
      .section-subtitle { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #586a75; }
      .node-title { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #15232d; }
      .node-text { font: 500 12.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #425461; }
      .badge { font: 700 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0.6px; }
      .small { font: 500 11.5px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #556773; }
      .panel { stroke-width: 1.4; filter: url(#soft-shadow); }
      .v0-panel { fill: #edf8f1; stroke: #8bc89d; }
      .v1-panel { fill: #fff7df; stroke: #dfbd52; }
      .v2-panel { fill: #f2ecfb; stroke: #aa8bd7; }
      .node { fill: #ffffff; stroke: #d6e1e7; stroke-width: 1.2; }
      .core { fill: #ffffff; stroke: #5eaa78; stroke-width: 2; }
      .evidence { fill: #ffffff; stroke: #6291a8; stroke-width: 1.8; }
      .v1-node { fill: #fffdf5; stroke: #dfbd52; stroke-width: 1.2; }
      .v2-node { fill: #fbf9ff; stroke: #aa8bd7; stroke-width: 1.2; }
      .line { fill: none; stroke: #2f5f6f; stroke-width: 2.3; marker-end: url(#arrow-main); }
      .soft-line { fill: none; stroke: #8a6f1a; stroke-width: 1.8; stroke-dasharray: 7 7; marker-end: url(#arrow-soft); }
    </style>
  </defs>

  <rect class="bg" width="1400" height="860" rx="0" />
  <text class="title" x="70" y="70">Humanoid Locomotion Runtime</text>
  <text class="subtitle" x="70" y="100">V0 is the paper evidence path; V1 and V2 stay behind explicit gates.</text>

  <rect class="panel v0-panel" x="50" y="135" width="880" height="660" rx="22" />
  <text class="section-title" x="82" y="180">V0 必须实现</text>
  <text class="section-subtitle" x="82" y="204">single runtime loop, leakage boundary, snapshot branching, reproducible evidence</text>
  <rect x="805" y="160" width="88" height="28" rx="14" fill="#2f8b57" />
  <text class="badge" x="828" y="179" fill="#ffffff">PAPER</text>

  <rect class="panel v1-panel" x="965" y="135" width="385" height="300" rx="22" />
  <text class="section-title" x="998" y="180">候选 V1</text>
  <text class="section-subtitle" x="998" y="204">after V0 evidence gates</text>
  <rect x="1228" y="160" width="84" height="28" rx="14" fill="#ba8a00" />
  <text class="badge" x="1252" y="179" fill="#ffffff">NEXT</text>

  <rect class="panel v2-panel" x="965" y="485" width="385" height="310" rx="22" />
  <text class="section-title" x="998" y="530">候选 V2</text>
  <text class="section-subtitle" x="998" y="554">cross-platform, hardware, multi-agent extensions</text>
  <rect x="1228" y="510" width="84" height="28" rx="14" fill="#7d54b8" />
  <text class="badge" x="1245" y="529" fill="#ffffff">LATER</text>

  <rect class="node" x="95" y="250" width="190" height="92" rx="14" />
  <text class="node-title" x="120" y="284">Inputs</text>
  <text class="node-text" x="120" y="309">language command</text>
  <text class="node-text" x="120" y="329">RGB-D + robot state</text>

  <rect class="node" x="335" y="250" width="205" height="92" rx="14" />
  <text class="node-title" x="360" y="284">Gate B Schemas</text>
  <text class="node-text" x="360" y="309">PolicyObservation</text>
  <text class="node-text" x="360" y="329">RuntimeEvent / OracleAnnotation</text>

  <rect class="core" x="595" y="244" width="255" height="105" rx="16" />
  <text class="node-title" x="625" y="278">RuntimeManager</text>
  <text class="node-text" x="625" y="303">only high-level command entry</text>
  <text class="node-text" x="625" y="323">no privileged simulator fields</text>

  <rect class="node" x="95" y="402" width="190" height="92" rx="14" />
  <text class="node-title" x="120" y="436">Perception</text>
  <text class="node-text" x="120" y="461">controlled grounding</text>
  <text class="node-text" x="120" y="481">temporary object memory</text>

  <rect class="node" x="335" y="402" width="205" height="92" rx="14" />
  <text class="node-title" x="360" y="436">Planning + Safety</text>
  <text class="node-text" x="360" y="461">NavigatorV0 local planner</text>
  <text class="node-text" x="360" y="481">SafetySupervisor override</text>

  <rect class="core" x="595" y="402" width="255" height="92" rx="16" />
  <text class="node-title" x="625" y="436">Frozen Controller</text>
  <text class="node-text" x="625" y="461">Unitree G1 or fallback backend</text>
  <text class="node-text" x="625" y="481">MuJoCo runtime</text>

  <rect class="node" x="95" y="555" width="190" height="105" rx="14" />
  <text class="node-title" x="120" y="589">Recovery Memory</text>
  <text class="node-text" x="120" y="614">body/event memory</text>
  <text class="node-text" x="120" y="634">instant / frame-stack / GRU</text>

  <rect class="core" x="335" y="555" width="205" height="105" rx="16" />
  <text class="node-title" x="360" y="589">Recovery Selector</text>
  <text class="node-text" x="360" y="614">typed high-level options</text>
  <text class="node-text" x="360" y="634">rule fallback separated</text>

  <rect class="evidence" x="595" y="545" width="255" height="125" rx="16" />
  <text class="node-title" x="625" y="581">Evidence Package</text>
  <text class="node-text" x="625" y="606">snapshot branching</text>
  <text class="node-text" x="625" y="626">seeded benchmark</text>
  <text class="node-text" x="625" y="646">EDP + dashboard</text>

  <path class="line" d="M285 296 H335" />
  <path class="line" d="M540 296 H595" />
  <path class="line" d="M190 342 V402" />
  <path class="line" d="M438 342 V402" />
  <path class="line" d="M540 448 H595" />
  <path class="line" d="M723 349 V402" />
  <path class="line" d="M190 494 V555" />
  <path class="line" d="M285 608 H335" />
  <path class="line" d="M540 608 H595" />
  <path class="line" d="M723 494 V545" />

  <rect class="v1-node" x="998" y="245" width="140" height="62" rx="12" />
  <text class="node-title" x="1018" y="271">Real Detector</text>
  <text class="node-text" x="1018" y="291">open vocab path</text>

  <rect class="v1-node" x="1175" y="245" width="140" height="62" rx="12" />
  <text class="node-title" x="1195" y="271">3D Memory</text>
  <text class="node-text" x="1195" y="291">persistent semantic</text>

  <rect class="v1-node" x="998" y="340" width="140" height="62" rx="12" />
  <text class="node-title" x="1018" y="366">Global Nav</text>
  <text class="node-text" x="1018" y="386">active exploration</text>

  <rect class="v1-node" x="1175" y="340" width="140" height="62" rx="12" />
  <text class="node-title" x="1195" y="366">VLM Branch</text>
  <text class="node-text" x="1195" y="386">appendix baseline</text>

  <rect class="v2-node" x="998" y="595" width="140" height="62" rx="12" />
  <text class="node-title" x="1018" y="621">Transfer</text>
  <text class="node-text" x="1018" y="641">other humanoids</text>

  <rect class="v2-node" x="1175" y="595" width="140" height="62" rx="12" />
  <text class="node-title" x="1195" y="621">Hardware</text>
  <text class="node-text" x="1195" y="641">real robot evidence</text>

  <rect class="v2-node" x="998" y="690" width="140" height="62" rx="12" />
  <text class="node-title" x="1018" y="716">Adaptation</text>
  <text class="node-text" x="1018" y="736">not V0 low-level</text>

  <rect class="v2-node" x="1175" y="690" width="140" height="62" rx="12" />
  <text class="node-title" x="1195" y="716">Agent Bus</text>
  <text class="node-text" x="1195" y="736">async audit only</text>

  <path class="soft-line" d="M965 275 C915 275 900 288 850 296" />
  <path class="soft-line" d="M965 370 C915 370 900 430 850 448" />
  <path class="soft-line" d="M965 626 C920 626 895 470 850 448" />
  <path class="soft-line" d="M965 721 C925 721 890 650 850 608" />

  <rect x="92" y="715" width="760" height="44" rx="12" fill="#ffffff" stroke="#c7d6de" stroke-width="1.2" />
  <text class="small" x="118" y="743">Rule: V0 produces reproducible simulator evidence first. V1/V2 are candidates only after evidence gates pass.</text>
</svg>
